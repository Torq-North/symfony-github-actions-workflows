# Continuous Integration for projects using Docker
#
# on:
#   pull_request:
#     types: [opened, reopened, synchronize]
# jobs:
#   ci:
#     uses: TorqIT/symfony-github-actions-workflows/.github/workflows/ci-docker.yml@v1
#     permissions:
#       contents: read
#       actions: read
#     secrets:
#       BUILD_TIME_SECRETS: >
#         {
#           "my-build-secret": "${{ secrets.MY_BUILD_SECRET }}",
#           "my-other-build-secret": "${{ secrets.MY_OTHER_BUILD_SECRET }}"
#         }
#

name: CI

on:
  workflow_call:
    inputs:
      RUNNER:
        required: false
        type: string
        description: Optional self-hosted runner for this workflow (see https://github.com/TorqIT/symfony-github-actions-workflows#self-hosted-runners)
      PROJECT_REPOSITORY:
        required: false
        default: "${{ github.repository }}"
        type: string
        description: "The GitHub repository of the project containing Symfony"
      PROJECT_REPOSITORY_REF:
        required: false
        default: "${{ github.ref }}"
        type: string
        description: "The Git reference (branch, tag, commit SHA) to checkout from the project repository"
      NPM_BUILD:
        required: false
        type: boolean
        description: "Whether an NPM build should be run prior to building the PHP image"
      NPM_RUN_CMD:
        required: false
        type: string
        description: "The NPM command that should be run prior to building the PHP image"
      NPM_SPA:
        required: false
        type: boolean
        description: "Whether the NPM build results in a single-page application"
      SPA_TWIG:
        required: false
        type: string
        default: "default/default.html.twig"
        description: "The path to the Twig file where the result of the NPM single-page application build should be copied"
      FRONTEND_ROOT:
        required: false
        type: string
        default: "frontend"
        description: "The path (relative to the project's root) where frontend files are stored"
      SUBMODULES:
        required: false
        type: boolean
        default: false
        description: "Whether to clone submodules when cloning the project repository"
      BUILD_TIME_ARGS:
        required: false
        type: string
        default: "{}"
        description: "A JSON object containing Docker build-time args in key: value format"
      SYMFONY_ROOT:
        required: false
        type: string
        default: "."
        description: "The path (relative to the project's root) in which the Symfony files are stored (e.g. config, src, etc)"
      INIT_DOCKERFILE:
        required: false
        type: string
        default: ".docker/Dockerfile"
        description: "The path (relative to the project's root) of the Dockerfile used to build the init image"
      INIT_DOCKER_TARGET:
        required: false
        type: string
        default: "init"
        description: "The Docker target to use when building the init image"
      PHP_DOCKERFILE:
        required: false
        type: string
        default: ".docker/Dockerfile"
        description: "The path (relative to the project's root) of the Dockerfile used to build the PHP image"
      PHP_DOCKER_TARGET:
        required: false
        type: string
        default: "php"
        description: "The Docker target to use when building the PHP image"
      SUPERVISORD:
        required: false
        type: boolean
        default: false
        description: "Whether the project uses a supervisord container"
      SUPERVISORD_DOCKERFILE:
        required: false
        type: string
        default: ".docker/Dockerfile"
        description: "The path (relative to the project's root) of the Dockerfile used to build the supervisord image"
      SUPERVISORD_TARGET:
        required: false
        type: string
        default: "supervisord"
        description: "The Docker target to use when building the supervisord image"
      RUN_UNIT_TESTS:
        required: false
        type: boolean
        default: false
        description: "Whether to run unit tests. Default: false, but will be true in future versions"
      RUN_E2E_TESTS:
        required: false
        type: boolean
        default: false
        description: "Whether to run end-to-end tests. Default: false, but will be true in future versions"
      UNIT_TESTS_DIRECTORY:
        required: false
        type: string
        default: "tests"
        description: "The directory where unit tests are located - note this should be relative to the Symfony root, as once inside the container the working directory is set to the Symfony root"
      E2E_TESTS_DIRECTORY:
        required: false
        type: string
        default: "e2e"
        description: "The directory where end-to-end tests are located - note this should be relative to the Symfony root, as once inside the container the working directory is set to the Symfony root"
      PHP_DOCKER_COMPOSE_SERVICE:
        required: false
        type: string
        default: "php"
        description: "The name of the PHP service in your Docker Compose setup used for end-to-end tests"
      NODE_VERSION:
        required: false
        type: string
        default: "25"
        description: "The Node.js version to use when running end-to-end tests"
      GITHUB_APP_CHECKOUT:
        required: false
        type: boolean
        default: false
        description: "Whether to use a GitHub App token for checking out the project repository and submodules"
      GITHUB_APP_CHECKOUT_REPOSITORIES:
        required: false
        type: string
        default: ""
        description: "A comma or newline-separated list of repositories to checkout with the GitHub App token - if empty, only the main project repository will be checked out"

    secrets:
      BUILD_TIME_SECRETS:
        required: false
        description: A JSON object of secrets required at build-time (see above for example format)
      RECAPTCHA_CLIENT_KEY:
        required: false
        description: (Optional) A client key used when building NPM frontends that require ReCAPTCHA
      GITHUB_APP_ID:
        required: false
        description: The ID of the GitHub App used to generate a token for checking out the project repository and submodules
      GITHUB_APP_PRIVATE_KEY:
        required: false
        description: The private key of the GitHub App used to generate a token for checking out the project repository and submodules

jobs:
  lint:
    name: Lint files
    runs-on: ${{ inputs.RUNNER || 'ubuntu-latest' }}

    steps:
      - name: Create token from GitHub App
        uses: actions/create-github-app-token@v2
        if: ${{ inputs.GITHUB_APP_CHECKOUT }}
        id: create_token
        with:
          app-id: ${{ secrets.GITHUB_APP_ID }}
          private-key: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
          repositories: ${{ inputs.GITHUB_APP_CHECKOUT_REPOSITORIES }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.PROJECT_REPOSITORY }}
          ref: ${{ inputs.PROJECT_REPOSITORY_REF }}
          submodules: ${{ inputs.SUBMODULES }}
          token: ${{ inputs.GITHUB_APP_CHECKOUT && steps.create_token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Get workflow version
        id: workflow-version
        uses: canonical/get-workflow-version-action@v1
        with:
          repository-name: TorqIT/symfony-github-actions-workflows
          file-name: ci-docker.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout workflow repository to use composite actions
        uses: actions/checkout@v4
        with:
          repository: TorqIT/symfony-github-actions-workflows
          ref: ${{ steps.workflow-version.outputs.sha }}
          path: reusable-workflow
          fetch-depth: 1

      - name: Install tools for workflows/actions
        uses: ./reusable-workflow/.github/actions/setup-tools

      - name: Lint all files
        uses: ./reusable-workflow/.github/actions/lint

  build-init:
    name: Build init image
    runs-on: ${{ inputs.RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Create token from GitHub App
        uses: actions/create-github-app-token@v2
        if: ${{ inputs.GITHUB_APP_CHECKOUT }}
        id: create_token
        with:
          app-id: ${{ secrets.GITHUB_APP_ID }}
          private-key: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
          repositories: ${{ inputs.GITHUB_APP_CHECKOUT_REPOSITORIES }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.PROJECT_REPOSITORY }}
          ref: ${{ inputs.PROJECT_REPOSITORY_REF }}
          submodules: ${{ inputs.SUBMODULES }}
          token: ${{ inputs.GITHUB_APP_CHECKOUT && steps.create_token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Get workflow version
        id: workflow-version
        uses: canonical/get-workflow-version-action@v1
        with:
          repository-name: TorqIT/symfony-github-actions-workflows
          file-name: ci-docker.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout workflow repository to use composite actions
        uses: actions/checkout@v4
        with:
          repository: TorqIT/symfony-github-actions-workflows
          ref: ${{ steps.workflow-version.outputs.sha }}
          path: reusable-workflow
          fetch-depth: 1

      - name: Install tools for workflows/actions
        uses: ./reusable-workflow/.github/actions/setup-tools

      - name: Set up Docker
        uses: ./reusable-workflow/.github/actions/setup-docker

      - name: Build init image
        uses: ./reusable-workflow/.github/actions/build-and-push-symfony-image
        with:
          DOCKERFILE_TARGET: ${{ inputs.INIT_DOCKER_TARGET }}
          DOCKERFILE_PATH: ${{ inputs.INIT_DOCKERFILE }}
          BUILD_TIME_ARGS: ${{ inputs.BUILD_TIME_ARGS }}
          BUILD_TIME_SECRETS: ${{ secrets.BUILD_TIME_SECRETS }}
          SYMFONY_ROOT: ${{ inputs.SYMFONY_ROOT }}
          PUSH: false

  build-php:
    name: Build PHP image
    runs-on: ${{ inputs.RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Create token from GitHub App
        uses: actions/create-github-app-token@v2
        if: ${{ inputs.GITHUB_APP_CHECKOUT }}
        id: create_token
        with:
          app-id: ${{ secrets.GITHUB_APP_ID }}
          private-key: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
          repositories: ${{ inputs.GITHUB_APP_CHECKOUT_REPOSITORIES }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.PROJECT_REPOSITORY }}
          ref: ${{ inputs.PROJECT_REPOSITORY_REF }}
          submodules: ${{ inputs.SUBMODULES }}
          token: ${{ inputs.GITHUB_APP_CHECKOUT && steps.create_token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Get workflow version
        id: workflow-version
        uses: canonical/get-workflow-version-action@v1
        with:
          repository-name: TorqIT/symfony-github-actions-workflows
          file-name: ci-docker.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout workflow repository to use composite actions
        uses: actions/checkout@v4
        with:
          repository: TorqIT/symfony-github-actions-workflows
          ref: ${{ steps.workflow-version.outputs.sha }}
          path: reusable-workflow
          fetch-depth: 1

      - name: Install tools for workflows/actions
        uses: ./reusable-workflow/.github/actions/setup-tools

      - name: Set up Docker
        uses: ./reusable-workflow/.github/actions/setup-docker

      - name: Build PHP image
        uses: ./reusable-workflow/.github/actions/build-and-push-symfony-image
        with:
          DOCKERFILE_PATH: ${{ inputs.PHP_DOCKERFILE }}
          DOCKERFILE_TARGET: ${{ inputs.PHP_DOCKER_TARGET }}
          BUILD_TIME_ARGS: ${{ inputs.BUILD_TIME_ARGS }}
          BUILD_TIME_SECRETS: ${{ secrets.BUILD_TIME_SECRETS }}
          SYMFONY_ROOT: ${{ inputs.SYMFONY_ROOT }}
          FRONTEND_ROOT: ${{ inputs.FRONTEND_ROOT }}
          NPM_BUILD: ${{ inputs.NPM_BUILD }}
          RECAPTCHA_CLIENT_KEY: ${{ secrets.RECAPTCHA_CLIENT_KEY }}
          NPM_SPA: ${{ inputs.NPM_SPA }}
          SPA_TWIG: ${{ inputs.SPA_TWIG }}
          NPM_RUN_CMD: ${{ inputs.NPM_RUN_CMD }}
          PUSH: false

  build-supervisord:
    name: Build supervisord image
    runs-on: ${{ inputs.RUNNER || 'ubuntu-latest' }}
    if: ${{ inputs.SUPERVISORD }}
    steps:
      - name: Create token from GitHub App
        uses: actions/create-github-app-token@v2
        if: ${{ inputs.GITHUB_APP_CHECKOUT }}
        id: create_token
        with:
          app-id: ${{ secrets.GITHUB_APP_ID }}
          private-key: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
          repositories: ${{ inputs.GITHUB_APP_CHECKOUT_REPOSITORIES }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.PROJECT_REPOSITORY }}
          ref: ${{ inputs.PROJECT_REPOSITORY_REF }}
          submodules: ${{ inputs.SUBMODULES }}
          token: ${{ inputs.GITHUB_APP_CHECKOUT && steps.create_token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Get workflow version
        id: workflow-version
        uses: canonical/get-workflow-version-action@v1
        with:
          repository-name: TorqIT/symfony-github-actions-workflows
          file-name: ci-docker.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout workflow repository to use composite actions
        uses: actions/checkout@v4
        with:
          repository: TorqIT/symfony-github-actions-workflows
          ref: ${{ steps.workflow-version.outputs.sha }}
          path: reusable-workflow
          fetch-depth: 1

      - name: Install tools for workflows/actions
        uses: ./reusable-workflow/.github/actions/setup-tools

      - name: Set up Docker
        uses: ./reusable-workflow/.github/actions/setup-docker

      - name: Build supervisord image
        uses: ./reusable-workflow/.github/actions/build-and-push-symfony-image
        with:
          DOCKERFILE_PATH: ${{ inputs.SUPERVISORD_DOCKERFILE }}
          DOCKERFILE_TARGET: ${{ inputs.SUPERVISORD_TARGET }}
          BUILD_TIME_ARGS: ${{ inputs.BUILD_TIME_ARGS }}
          BUILD_TIME_SECRETS: ${{ secrets.BUILD_TIME_SECRETS }}
          SYMFONY_ROOT: ${{ inputs.SYMFONY_ROOT }}
          PUSH: false

  run-unit-tests:
    name: Run unit tests
    runs-on: ${{ inputs.RUNNER || 'ubuntu-latest' }}
    if: ${{ inputs.RUN_UNIT_TESTS }}
    steps:
      - name: Create token from GitHub App
        uses: actions/create-github-app-token@v2
        if: ${{ inputs.GITHUB_APP_CHECKOUT }}
        id: create_token
        with:
          app-id: ${{ secrets.GITHUB_APP_ID }}
          private-key: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
          repositories: ${{ inputs.GITHUB_APP_CHECKOUT_REPOSITORIES }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.PROJECT_REPOSITORY }}
          ref: ${{ inputs.PROJECT_REPOSITORY_REF }}
          submodules: ${{ inputs.SUBMODULES }}
          token: ${{ inputs.GITHUB_APP_CHECKOUT && steps.create_token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Get workflow version
        id: workflow-version
        uses: canonical/get-workflow-version-action@v1
        with:
          repository-name: TorqIT/symfony-github-actions-workflows
          file-name: ci-docker.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout workflow repository to use composite actions
        uses: actions/checkout@v4
        with:
          repository: TorqIT/symfony-github-actions-workflows
          ref: ${{ steps.workflow-version.outputs.sha }}
          path: reusable-workflow
          fetch-depth: 1

      - name: Install tools for workflows/actions
        uses: ./reusable-workflow/.github/actions/setup-tools

      - name: Set up Docker
        uses: ./reusable-workflow/.github/actions/setup-docker

      - name: Run unit tests
        uses: ./reusable-workflow/.github/actions/run-unit-tests
        with:
          DOCKERFILE: ${{ inputs.INIT_DOCKERFILE || inputs.PHP_DOCKERFILE }}
          DOCKERFILE_TARGET: ${{ inputs.INIT_DOCKER_TARGET || inputs.PHP_DOCKER_TARGET }}
          BUILD_TIME_ARGS: ${{ inputs.BUILD_TIME_ARGS }}
          BUILD_TIME_SECRETS: ${{ secrets.BUILD_TIME_SECRETS }}
          SYMFONY_ROOT: ${{ inputs.SYMFONY_ROOT }}
          UNIT_TESTS_DIRECTORY: ${{ inputs.UNIT_TESTS_DIRECTORY }}

  run-e2e-tests:
    name: Run e2e tests
    if: ${{ inputs.RUN_E2E_TESTS != '' }}
    runs-on: ${{ inputs.RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Checkout Symfony project repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.PROJECT_REPOSITORY }}
          ref: ${{ inputs.PROJECT_REPOSITORY_REF }}
          submodules: ${{ inputs.SUBMODULES }}

      - name: Get workflow version
        id: workflow-version
        uses: canonical/get-workflow-version-action@v1
        with:
          repository-name: TorqIT/symfony-github-actions-workflows
          file-name: ci-docker.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout workflow repository to use composite actions
        uses: actions/checkout@v4
        with:
          repository: TorqIT/symfony-github-actions-workflows
          ref: ${{ steps.workflow-version.outputs.sha }}
          path: reusable-workflow
          fetch-depth: 1

      - name: Install tools for workflows/actions
        uses: ./reusable-workflow/.github/actions/setup-tools

      - name: Setup Docker
        uses: ./reusable-workflow/.github/actions/setup-docker

      - name: Run e2e tests
        uses: ./reusable-workflow/.github/actions/run-e2e-tests
        with:
          BUILD_TIME_SECRETS: ${{ secrets.BUILD_TIME_SECRETS }}
          RUN_TIME_SECRETS: ${{ secrets.RUN_TIME_SECRETS }}
          NODE_VERSION: ${{ inputs.NODE_VERSION }}
          TESTS_DIRECTORY: "${{ inputs.E2E_TESTS_DIRECTORY }}"
          PHP_DOCKER_COMPOSE_SERVICE: ${{ inputs.PHP_DOCKER_COMPOSE_SERVICE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
